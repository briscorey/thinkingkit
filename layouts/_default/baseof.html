<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}ThinkingKit — Better tools for better thinking{{ else }}{{ .Title }} | ThinkingKit{{ end }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="ThinkingKit">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "ThinkingKit",
    "url": "https://thinkingkit.org/",
    "description": "{{ .Site.Params.description }}"
  }
  </script>
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
  {{ block "head" . }}{{ end }}
</head>
<body>
  <nav class="site-nav" id="site-nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <line x1="50" y1="20" x2="25" y2="45" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
          <line x1="50" y1="20" x2="75" y2="45" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
          <line x1="25" y1="45" x2="35" y2="80" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
          <line x1="75" y1="45" x2="65" y2="80" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
          <line x1="35" y1="80" x2="65" y2="80" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
          <line x1="25" y1="45" x2="75" y2="45" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>
          <circle cx="50" cy="20" r="5.5" fill="#f59e0b"/>
          <circle cx="25" cy="45" r="5.5" fill="#f59e0b"/>
          <circle cx="75" cy="45" r="5.5" fill="#f59e0b"/>
          <circle cx="35" cy="80" r="5.5" fill="#f59e0b"/>
          <circle cx="65" cy="80" r="5.5" fill="#f59e0b"/>
        </svg>
        ThinkingKit
      </a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
        <li><button onclick="toggleSearch()" style="background:none;border:none;color:var(--color-text-secondary);cursor:pointer;padding:0;font-size:0.85rem;font-weight:500;font-family:var(--font-body);" aria-label="Search">Search</button></li>
      </ul>
    </div>
  </nav>
  {{ block "main" . }}{{ end }}
  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ now.Year }} ThinkingKit. Free and open. Built by <a href="https://learnlattice.com">Corey Zocchi</a>.</p>
    </div>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const els = document.querySelectorAll('.animate-in');
      if (!els.length) return;
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      els.forEach(el => obs.observe(el));
    });
  </script>
  <!-- Search overlay -->
  <div id="search-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(9,10,12,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:15vh 1.5rem 2rem;" onclick="if(event.target===this)toggleSearch()">
    <div style="max-width:600px;margin:0 auto;">
      <div id="search-container"></div>
    </div>
  </div>
  <script src="/pagefind/pagefind-ui.js"></script>
  <script>
    let searchInit = false;
    function toggleSearch() {
      const overlay = document.getElementById('search-overlay');
      const visible = overlay.style.display !== 'none';
      overlay.style.display = visible ? 'none' : 'block';
      if (!visible) {
        if (!searchInit) {
          new PagefindUI({ element: '#search-container', showSubResults: true, showImages: false });
          searchInit = true;
          // Style overrides for dark theme
          const style = document.createElement('style');
          style.textContent = `
            .pagefind-ui--reset { --pagefind-ui-text: #e8e9ed !important; --pagefind-ui-background: #15171c !important; --pagefind-ui-border: #2a2d38 !important; --pagefind-ui-primary: #f59e0b !important; --pagefind-ui-tag: #f59e0b !important; }
            .pagefind-ui .pagefind-ui__search-input { font-family: 'DM Sans', sans-serif !important; font-size: 1.1rem !important; border-radius: 10px !important; }
            .pagefind-ui .pagefind-ui__result-link { color: #f59e0b !important; }
            .pagefind-ui .pagefind-ui__result-excerpt { color: #9ea1ad !important; }
          `;
          document.head.appendChild(style);
        }
        setTimeout(() => {
          const input = document.querySelector('.pagefind-ui__search-input');
          if (input) input.focus();
        }, 100);
      }
    }
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggleSearch(); }
      if (e.key === 'Escape') { document.getElementById('search-overlay').style.display = 'none'; }
    });
  </script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
