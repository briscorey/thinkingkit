<div style="background:var(--color-bg-card);border:1px solid var(--color-border-light);border-radius:var(--radius-lg);padding:var(--space-xl);box-shadow:var(--shadow-md);max-width:520px;margin:0 auto;">
  <h3 style="margin:0 0 var(--space-sm);font-family:var(--font-display);font-weight:400;font-size:1.2rem;">Think Better Weekly</h3>
  <p style="color:var(--color-ink-muted);font-size:0.85rem;margin-bottom:var(--space-lg);">One mental model per week, explained with a real-world example and a practical exercise. Free, no spam, unsubscribe anytime.</p>
  <form action="https://buttondown.com/api/emails/embed-subscribe/thinkingkit" method="post" target="popupwindow" onsubmit="window.open('https://buttondown.com/thinkingkit', 'popupwindow')" style="display:flex;gap:var(--space-sm);">
    <input type="email" name="email" placeholder="your@email.com" required style="flex:1;padding:0.6rem 1rem;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-ink);font-family:var(--font-body);font-size:0.9rem;">
    <button type="submit" class="btn btn-primary" style="padding:0.6rem 1.2rem;white-space:nowrap;">Subscribe</button>
  </form>
</div>
